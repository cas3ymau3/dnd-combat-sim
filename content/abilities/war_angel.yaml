# war_angel.yaml
# Build-specific abilities for the War Angel (design/build-guides/38_the_war_angel.txt).
# The build's generic abilities (Bless, etc.) live in core_examples.yaml and are
# reused from there; this file holds only what is specific to this build.
#
# These are the first abilities to drive the engine FROM DATA (src/content.py).
# Each is diffed against the hand-coded War Angel oracle in src/builds/war_angel.py.

---
# ─── WRATHFUL SMITE (the damage half) ────────────────────────────────────────
# 2024 RAW: cast as a bonus action immediately AFTER a melee hit (like Divine
# Smite), adding 1d6 radiant (doubled on a crit).  The WIS-save/frightened half
# is deferred (PROGRESS "Open threads") — only the on-hit damage rider is modeled.
#
# Note the strict layer separation pays off here: the slot PRIORITY
# (free_cast → pact_magic_slot → spell_slot_1) is NOT in this data — that is
# build-specific resource arbitration and stays in WarAngelPolicy.  The cost
# layer states only the ABSTRACT resource (a level-1+ spell slot); the policy
# resolves which concrete pool to spend.

name: wrathful_smite
tags: [active, spell]
trigger:
  all:
    - event: on_hit
    - weapon: melee
effect:
  - verb: damage
    dice:
      base: "1d6"
    type: radiant
    phase: 1                  # smite dice injected before crit doubling
cost:
  action_economy: bonus_action
  resource:
    type: spell_slot
    min_level: 1
duration:
  type: instantaneous

---
# ─── BRUTALITY (Gladiator) — bluff / bleed modes ─────────────────────────────
# An on-hit feature with two mutually exclusive modes the build calls "bluff"
# and "bleed".  Schema-wise this is one feature with a choice; we model the two
# modes as two ability docs and let the POLICY pick which fires (choose_one is
# deferred to the Flourish slice — see PROGRESS gap #1).
#
# Layer-separation notes that matter here:
#   - `apply_status` is routed by `target`: a TARGET status whose name is a
#     weapon mastery (vex/sap) becomes the hit's extra mastery; a SELF status
#     (advantage_next_save) is applied to the attacker.  The interpreter raises
#     loudly on a target status that is NOT a known mastery (the engine has no
#     field for a generic on-hit target status yet — e.g. frightened).
#   - bleed's +CHA flat damage is the first RUNTIME-DEPENDENT value: the data
#     says `ability_modifier: charisma`, the interpreter resolves it against a
#     context the policy supplies ({"charisma": cha_mod}).  It is phase-5 flat,
#     so it does NOT scale on a crit (matches extra_flat_damage).
#   - The brutality CHARGE is in the cost layer, but WHETHER it is spent is
#     policy arbitration: the Flourish Counter grants bleed for free, so the
#     policy overrides the cost there (the data states the default; the policy
#     decides the context — exactly the locked boundary).

name: brutality_bluff
tags: [active]
trigger:
  all:
    - event: on_hit
    - weapon: melee
effect:
  - verb: apply_status
    status: vex                   # weapon mastery applied to the creature hit
    target: target
  - verb: apply_status
    status: advantage_next_save   # the next CON (concentration) save reads this
    target: self
cost:
  action_economy: null            # bluff costs only a brutality charge
  resource:
    type: brutality
    count: 1
duration:
  type: instantaneous

---
name: brutality_bleed
tags: [active]
trigger:
  all:
    - event: on_hit
    - weapon: melee
effect:
  - verb: apply_status
    status: sap                   # weapon mastery applied to the creature hit
    target: target
  - verb: damage
    amount:
      ability_modifier: charisma  # +CHA flat; phase 5 → does NOT scale on a crit
    phase: 5
    type: physical
cost:
  action_economy: null
  resource:
    type: brutality
    count: 1
duration:
  type: instantaneous
