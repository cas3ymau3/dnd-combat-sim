# starfire_scion.yaml
# Build-specific abilities for The Starfire Scion
# (design/build-guides/41_spellfire_scion.txt) — a Monk-08 (Sun-Soul) /
# Druid-12 (Circle of Stars) WIS-based spellfire gish.
#
# These drive the engine FROM DATA (src/content.py).  The Starfire Scion is the
# second archetype; it forces the save-FOR-damage and dice-scaling primitives the
# attack-roll War Angel never did (see PROGRESS.md "Second archetype").

---
# ─── SACRED FLAME (Spellfire Spark) ──────────────────────────────────────────
# 2024 cantrip: the target makes a DEX saving throw vs our spell save DC; on a
# FAIL it takes radiant damage, on a SAVE nothing (save-NEGATES).  The damage die
# COUNT scales with character level by the canonical cantrip rule (1 die, +1 at
# L5 / L11 / L17): 1d8 → 2d8 → 3d8 → 4d8.
#
# This is the schema's save-for-damage shape (core_examples #4): a `save` block
# (which ability, vs which DC) + a `damage` block (scaled dice, on_save).  The
# interpreter (interpret_save_spell) resolves the `scaling: cantrip` dice against
# the caster's character level — primitive #2.  WHICH save stat / DC are DATA
# here; the cantrip SCALING RULE is data; the policy keeps WHEN to cast and the
# Spellfire-Spark per-LR limit (resource arbitration).

name: sacred_flame
tags: [active, spell, cantrip]
trigger:
  all:
    - event: on_use
effect:
  - verb: save
    ability: dexterity
    dc_reference: spell_save_dc
  - verb: damage
    dice:
      base: "1d8"
      scaling: cantrip            # canonical 5.5e cantrip rule: +1 die at L5/11/17
      level_reference: character_level
    type: radiant
    on_save: none                 # save NEGATES (full on fail, nothing on a save)
    target: target
cost:
  # Sacred Flame itself is a free cantrip; Spellfire Spark lets it be cast as a
  # bonus action a limited number of times per long rest.  The per-LR LIMIT is
  # policy/resource arbitration, left out of the intrinsic for now.
  action_economy: bonus_action
duration:
  type: instantaneous

---
# ─── SEARING ARC STRIKE (upcast Burning Hands) ───────────────────────────────
# Monk-6 feature (char L10+): after the Attack action, cast (an upcast) Burning
# Hands as a BONUS ACTION.  2024 Burning Hands: a DEX saving throw vs our spell
# save DC for HALF damage (full on a fail) — base 3d6 at slot level 1, +1d6 per
# slot level above 1 (uniform `increment` scaling keyed on slot_level).  Modeled
# SINGLE-TARGET for now (the multi-enemy AoE axis is deferred — see PROGRESS).
#
# This is the schema's save-FOR-HALF shape (interpret_save_spell, on_save: half)
# carried on top of primitive #3's upcast dice: `_resolve_scaling_dice` folds the
# `increment`/`level_reference: slot_level` block to (count, sides) at fire-time,
# given the slot the policy chose.  base_level defaults to 1 (Burning Hands's
# minimum slot), so it is omitted.  WHICH slot is spent stays policy arbitration.

name: shillelagh
tags: [active, spell, cantrip]
# Druid cantrip (char L9+ for this build, once Extra Attack lands).  Cast as a
# bonus action, it imbues a club/quarterstaff so it deals FORCE damage with the
# spell's own die instead of the weapon's, and lets you swing with your
# spellcasting modifier.  Only the DAMAGE DIE is modeled here — the WIS attack
# OPTION (which ability swings) is the build's attack-profile choice
# (_shillelagh_attack_choice), not an intrinsic of the cantrip's scaling.
#
# 2024 die scaling is the canonical cantrip threshold list [5, 11, 17] but it
# grows the die SIZE (and changes the COUNT at the top step), so it is the
# enumerated DICE LADDER, not the +1-die cantrip count rule:
#   char L1-4 = 1d8, L5-10 = 1d10, L11-16 = 1d12, L17+ = 2d6.
# Verified 2026-06-15 against the 2024 spell: D&D Beyond / Roll20 compendium /
# dnd2024.wikidot.com:spell:shillelagh, and build guide 41 line 353 ("shillelagh
# (1d10)" at the relevant tier).  interpret_scaled_dice folds this to (count,
# sides) against the character level.
trigger:
  all:
    - event: on_use
effect:
  - verb: damage
    dice:
      scaling: ladder            # enumerated die per break (size AND count vary)
      breaks: [5, 11, 17]        # canonical cantrip thresholds (character level)
      dice: ["1d8", "1d10", "1d12", "2d6"]
      level_reference: character_level
    type: force
    target: self                 # imbues the wielder's weapon
cost:
  action_economy: bonus_action
duration:
  type: instantaneous

---
name: searing_arc_strike
tags: [active, spell]
trigger:
  all:
    - event: on_use
effect:
  - verb: save
    ability: dexterity
    dc_reference: spell_save_dc
  - verb: damage
    dice:
      base: "3d6"
      increment: "1d6"            # +1d6 per slot level above the base slot
      every_n_levels: 1
      level_reference: slot_level
    type: fire
    on_save: half                 # save FOR HALF (full on fail, half on a save)
    target: target
cost:
  action_economy: bonus_action
  resource:
    type: spell_slot
    min_level: 1
duration:
  type: instantaneous
